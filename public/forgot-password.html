<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #000000; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #0a0a0a; border: 2px solid #FFD700; padding: 2rem; border-radius: 0px; width: 400px; }
        h1 { color: #FFD700; margin-bottom: 1rem; text-align: center; }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; background: #000; border: 2px solid #FFD700; color: #FFD700; }
        button { width: 100%; padding: 0.75rem; background: #FFD700; color: #000; border: none; cursor: pointer; font-weight: bold; }
        .message { margin: 0.5rem 0; text-align: center; }
        .error { color: #ff4444; }
        .success { color: #4caf50; }
        a { color: #FFD700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Forgot Password</h1>
        <div id="step1">
            <input type="email" id="email" placeholder="Enter your email">
            <button onclick="sendReset()">Send Reset Link</button>
        </div>
        <div id="step2" style="display:none;">
            <input type="text" id="token" placeholder="Enter reset token">
            <input type="password" id="newPassword" placeholder="New password (min 6 chars)">
            <button onclick="resetPassword()">Reset Password</button>
        </div>
        <div id="message" class="message"></div>
        <p style="text-align:center; margin-top:1rem;"><a href="/login">← Back to Login</a></p>
    </div>
    <script>
        async function sendReset() {
            const email = document.getElementById('email').value;
            const msg = document.getElementById('message');
            if (!email) { msg.innerHTML = '<span class="error">Enter email</span>'; return; }
            
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (data.success) {
                msg.innerHTML = `<span class="success">Reset token: ${data.message}</span>`;
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
            } else {
                msg.innerHTML = `<span class="error">${data.error}</span>`;
            }
        }
        
        async function resetPassword() {
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const msg = document.getElementById('message');
            
            if (!token || !newPassword) { msg.innerHTML = '<span class="error">All fields required</span>'; return; }
            if (newPassword.length < 6) { msg.innerHTML = '<span class="error">Password must be at least 6 characters</span>'; return; }
            
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            const data = await res.json();
            if (data.success) {
                msg.innerHTML = '<span class="success">Password reset! <a href="/login">Login here</a></span>';
            } else {
                msg.innerHTML = `<span class="error">${data.error}</span>`;
            }
        }
    </script>
</body>
</html>
