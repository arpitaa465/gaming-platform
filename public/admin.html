<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel - VoidGaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 215, 0, 0.03) 0px,
                rgba(255, 215, 0, 0.03) 2px,
                transparent 2px,
                transparent 8px
            );
            pointer-events: none;
            z-index: 0;
        }
        
        nav { 
            background: #000000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 3px solid #FFD700;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        nav a { 
            color: #FFD700; 
            text-decoration: none; 
            margin: 0 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        nav a:hover { 
            color: #ffffff;
            text-shadow: 0 0 5px #FFD700;
        }
        
        .container { 
            max-width: 1200px; 
            margin: 2rem auto; 
            padding: 0 1rem;
            position: relative;
            z-index: 1;
        }
        
        h1 { 
            font-size: 2.5rem;
            color: #FFD700;
            text-shadow: 2px 2px 0 #000000;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            border-left: 5px solid #FFD700;
            padding-left: 1rem;
        }
        
        h2 {
            color: #FFD700;
            margin: 1.5rem 0 1rem 0;
            border-left: 4px solid #FFD700;
            padding-left: 1rem;
            font-size: 1.3rem;
        }
        
        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        
        .stat-card {
            background: #0a0a0a;
            border: 2px solid #FFD700;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
        }
        
        .stat-number {
            font-size: 2.5rem;
            color: #FFD700;
            font-weight: bold;
        }
        
        .stat-label {
            color: #cccccc;
            margin-top: 0.5rem;
        }
        
        /* Sections */
        .section {
            background: #0a0a0a;
            border: 2px solid #FFD700;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        
        /* Forms */
        input, select {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            background: #000000;
            border: 2px solid #FFD700;
            color: #FFD700;
            font-family: 'Poppins', monospace;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #ffffff;
        }
        
        input::placeholder {
            color: #666;
        }
        
        button {
            background: #FFD700;
            color: #000000;
            border: none;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        
        button:hover {
            background: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        th {
            background: #FFD700;
            color: #000000;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #FFD700;
            color: #cccccc;
        }
        
        tr:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        .delete-btn {
            background: #ff4444;
            color: white;
            margin-right: 5px;
        }
        
        .delete-btn:hover {
            background: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .edit-btn {
            background: #FFD700;
            color: #000000;
        }
        
        .message {
            padding: 0.75rem;
            margin: 0.5rem 0;
            text-align: center;
        }
        
        .success {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid #4caf50;
            color: #4caf50;
        }
        
        .error {
            background: rgba(255, 68, 68, 0.3);
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            .stats {
                grid-template-columns: 1fr;
            }
            table {
                font-size: 0.8rem;
            }
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div style="font-size:1.5rem; color:#FFD700; font-weight:bold;"> VoidGaming Admin</div>
        <nav>
    <div style="font-size:1.5rem;"></div>
    <div>
        <a href="/">Home</a>
        <a href="/games">Games</a>
        <a href="/game-reviews">Reviews</a>
        <a href="/game-tournaments">Tournaments</a>
        <a href="/profile">👤 Profile</a>
        <span id="admin-link" style="display:none;"><a href="/admin"> Admin</a></span>
        <span id="auth-link"></span>
    </div>
</nav>
    </nav>
    
    <div class="container">
        <h1> ADMIN CONTROL PANEL</h1>
        
        <div id="adminContent">
            <div class="stats" id="stats">Loading..</div>
            
            <div class="section">
                <h2>➕ ADD NEW GAME</h2>
                <input type="text" id="gameTitle" placeholder="Game Title">
                <select id="gameGenre">
                    <option value="Action">Action</option>
                    <option value="Arcade">Arcade</option>
                    <option value="Racing">Racing</option>
                    <option value="Puzzle">Puzzle</option>
                    <option value="Sports">Sports</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Strategy">Strategy</option>
                </select>
                <button onclick="addGame()">ADD GAME</button>
                <div id="addMsg"></div>
            </div>
            
            <div class="section">
                <h2>📋 MANAGE GAMES</h2>
                <div id="gamesList">Loading...</div>
            </div>
            
            <div class="section">
                <h2>👥 MANAGE USERS</h2>
                <div id="usersList">Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            const res = await fetch('/api/admin/stats');
            const stats = await res.json();
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-number">${stats.totalUsers}</div><div class="stat-label">Total Users</div></div>
                <div class="stat-card"><div class="stat-number">${stats.totalGames}</div><div class="stat-label">Total Games</div></div>
                <div class="stat-card"><div class="stat-number">${stats.totalScores}</div><div class="stat-label">Total Scores</div></div>
                <div class="stat-card"><div class="stat-number">${stats.totalTournaments}</div><div class="stat-label">Total Tournaments</div></div>
            `;
        }
        
        async function loadGames() {
            const res = await fetch('/api/games');
            const games = await res.json();
            document.getElementById('gamesList').innerHTML = `
                <table>
                    <tr><th>Title</th><th>Genre</th><th>Plays</th><th>Actions</th></tr>
                    ${games.map(g => `
                        <tr>
                            <td>${g.title}</td>
                            <td>${g.genre}</td>
                            <td>${g.plays}</td>
                            <td><button class="edit-btn" onclick="editGame('${g._id}')">Edit</button> <button class="delete-btn" onclick="deleteGame('${g._id}')">Delete</button></td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }
        
        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            document.getElementById('usersList').innerHTML = `
                <table>
                    <tr><th>Username</th><th>Email</th><th>Role</th><th>Score</th><th>Actions</th></tr>
                    ${users.map(u => `
                        <tr>
                            <td>${u.username}</td>
                            <td>${u.email}</td>
                            <td>
                                <select onchange="changeRole('${u._id}', this.value)">
                                    <option value="player" ${u.role === 'player' ? 'selected' : ''}>Player</option>
                                    <option value="organiser" ${u.role === 'organiser' ? 'selected' : ''}>Organiser</option>
                                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                                </select>
                            </td>
                            <td>${u.totalScore}</td>
                            <td><button class="delete-btn" onclick="deleteUser('${u._id}')">Delete</button></td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }
        
        async function addGame() {
            const title = document.getElementById('gameTitle').value;
            const genre = document.getElementById('gameGenre').value;
            if(!title) { alert('Enter game title'); return; }
            
            const res = await fetch('/api/admin/add-game', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, genre })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('addMsg').innerHTML = '<div class="message success">✅ Game added successfully!</div>';
                document.getElementById('gameTitle').value = '';
                loadGames();
                loadStats();
                setTimeout(() => document.getElementById('addMsg').innerHTML = '', 3000);
            }
        }
        
        async function deleteGame(gameId) {
            if(confirm('Delete this game?')) {
                await fetch('/api/admin/delete-game', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameId })
                });
                loadGames();
                loadStats();
            }
        }
        
        async function editGame(gameId) {
            const newTitle = prompt('Enter new title:');
            if(newTitle) {
                await fetch('/api/admin/edit-game', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameId, title: newTitle })
                });
                loadGames();
            }
        }
        
        async function changeRole(userId, role) {
            await fetch('/api/admin/change-role', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, role })
            });
            loadUsers();
        }
        
        async function deleteUser(userId) {
            if(confirm('Delete this user?')) {
                await fetch('/api/admin/delete-user', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                loadUsers();
                loadStats();
            }
        }
        
        loadStats();
        loadGames();
        loadUsers();
    </script>
</body>
</html>
