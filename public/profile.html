<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Profile - VoidGaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #000000; color: white; position: relative; }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(255,215,0,0.03) 0px, rgba(255,215,0,0.03) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }
        nav { background: #000000; padding: 1rem 2rem; display: flex; justify-content: space-between; flex-wrap: wrap; border-bottom: 3px solid #FFD700; position: sticky; top: 0; z-index: 100; }
        nav a { color: #FFD700; text-decoration: none; margin: 0 1rem; font-weight: bold; transition: all 0.3s ease; }
        nav a:hover { color: #ffffff; text-shadow: 0 0 5px #FFD700; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; position: relative; z-index: 1; }
        h1 { font-size: 2rem; color: #FFD700; text-shadow: 2px 2px 0 #000; border-left: 5px solid #FFD700; padding-left: 1rem; margin-bottom: 1rem; }
        .profile-card { background: #0a0a0a; border: 2px solid #FFD700; padding: 1.5rem; margin: 1rem 0; text-align: center; }
        .stat-box { display: inline-block; margin: 0 1rem; text-align: center; }
        .stat-number { font-size: 2rem; color: #FFD700; font-weight: bold; }
        .score-item { background: #0a0a0a; border-left: 3px solid #FFD700; padding: 0.75rem; margin: 0.5rem 0; }
        .review-item { background: #0a0a0a; border-left: 3px solid #FFD700; padding: 0.75rem; margin: 0.5rem 0; }
        .warning { background: #ff9800; color: #000; padding: 1rem; text-align: center; margin: 1rem 0; }
        button { background: #FFD700; color: #000; border: none; padding: 0.6rem 1.2rem; cursor: pointer; font-weight: bold; margin-top: 0.5rem; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .game-card { background: #0a0a0a; border: 2px solid #FFD700; padding: 1rem; }
        @media (max-width: 600px) { nav { flex-direction: column; text-align: center; gap: 1rem; } }
    </style>
</head>
<body>
    <nav>
        <div style="font-size:1.5rem;"></div>
        <div>
            <a href="/">Home</a>
            <a href="/games">Games</a>
            <a href="/game-reviews">Reviews</a>
            <a href="/game-tournaments">Tournaments</a>
            <a href="/profile">Profile</a>
            <span id="admin-link" style="display:none;"><a href="/admin">Admin</a></span>
            <span id="auth-link"></span>
        </div>
    </nav>
    <div class="container">
        <h1> My Profile</h1>
        <div id="profileContent">Loading...</div>
        
        <div id="recommendations-section" style="margin-top: 2rem; display: none;">
            <h2> Recommended for You</h2>
            <div id="recommendations-container" class="games-grid">
                <div class="loading"></div>
            </div>
        </div>
    </div>

    <script>
        async function loadProfile() {
            const sessionRes = await fetch('/check-session');
            const session = await sessionRes.json();
            
            if (!session.loggedIn) {
                // Show login message, hide recommendations
                document.getElementById('profileContent').innerHTML = `
                    <div class="warning">
                        ⚠️ Please login to view your profile.<br><br>
                        <a href="/login"><button>Login</button></a>
                        <a href="/signup"><button>Sign Up</button></a>
                    </div>
                `;
                // Hide recommendations section
                const recSection = document.getElementById('recommendations-section');
                if (recSection) recSection.style.display = 'none';
                return;
            }
            
            // Show recommendations section for logged in users
            const recSection = document.getElementById('recommendations-section');
            if (recSection) recSection.style.display = 'block';
            
            // Get user profile
            const res = await fetch('/api/user/profile');
            const data = await res.json();
            
            let scoresHtml = '<div id="scoresList">';
            if (data.userScores && data.userScores.length > 0) {
                scoresHtml += data.userScores.map(s => {
                    const gameName = s.gameId?.title || 'Unknown Game';
                    const date = new Date(s.date).toLocaleDateString();
                    return `<div class="score-item">🎮 ${gameName} - ${s.score} points (${date})</div>`;
                }).join('');
            } else {
                scoresHtml += '<p>No scores yet. Play some games!</p>';
            }
            scoresHtml += '</div>';
            
            // Get user reviews
            const reviewsRes = await fetch('/api/user/reviews');
            const reviews = await reviewsRes.json();
            
            let reviewsHtml = '<div id="reviewsList">';
            if (reviews && reviews.length > 0) {
                reviewsHtml += reviews.map(r => {
                    const gameName = r.gameId?.title || 'Unknown Game';
                    return `<div class="review-item"> ${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)} - ${r.comment} <small>(${gameName})</small></div>`;
                }).join('');
            } else {
                reviewsHtml += '<p>No reviews yet. Write some reviews!</p>';
            }
            reviewsHtml += '</div>';
            
            const lastPlayedText = data.user.lastPlayed ? new Date(data.user.lastPlayed).toLocaleDateString() : 'Never';
            
            document.getElementById('profileContent').innerHTML = `
                <div class="profile-card">
                    <h2>${data.user.username}</h2>
                    <p> ${data.user.email}</p>
                    <p> Role: ${data.user.role}</p>
                    <div class="stat-box"><div class="stat-number">${data.user.totalScore}</div><div>Total Score</div></div>
                    <div class="stat-box"><div class="stat-number">${data.userScores?.length || 0}</div><div>Games Played</div></div>
                    <div class="stat-box"><div class="stat-number">${lastPlayedText}</div><div>Last Played</div></div>
                </div>
                <h2> Recent Scores</h2>
                ${scoresHtml}
                <h2> My Reviews</h2>
                ${reviewsHtml}
            `;
            
            loadRecommendations();
        }
        
        async function loadRecommendations() {
            try {
                const response = await fetch('/api/recommendations');
                const games = await response.json();
                const container = document.getElementById('recommendations-container');
                
                if (!container) return;
                
                if (!games || games.length === 0) {
                    container.innerHTML = '<p> Play some games to get personalized recommendations!</p>';
                    return;
                }
                
                let html = '<div class="games-grid">';
                for (let game of games) {
                    html += `
                        <div class="game-card">
                            <h3> ${game.title}</h3>
                            <p>  ${game.genre || 'Various'}</p>
                            <p>  ${game.plays || 0} plays</p>
                            <a href="${game.gameUrl}" target="_blank" rel="noopener noreferrer">
                                <button style="width:100%;">🎮 PLAY NOW</button>
                            </a>
                        </div>
                    `;
                }
                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading recommendations:', error);
                const container = document.getElementById('recommendations-container');
                if (container) container.innerHTML = '<p>Unable to load recommendations</p>';
            }
        }
        
        async function checkLogin() {
            const res = await fetch('/check-session');
            const data = await res.json();
            const authLink = document.getElementById('auth-link');
            const adminLink = document.getElementById('admin-link');
            if (data.loggedIn) {
                authLink.innerHTML = ` ${data.username} | <a href="#" onclick="logout()">Logout</a>`;
                if (data.role === 'admin') adminLink.style.display = 'inline';
            } else {
                authLink.innerHTML = '<a href="/login"> Login</a>';
            }
        }
        
        async function logout() { 
            await fetch('/logout', { method: 'POST' }); 
            window.location.href = '/'; 
        }
        
        checkLogin();
        loadProfile();
    </script>
</body>
</html>
